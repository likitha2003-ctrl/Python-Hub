kind = "web"
previewPath = "/"
title = "Python REPL"
version = "1.0.0"
id = "artifacts/python-repl"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 24134

[services.development]
run = "pnpm --filter @workspace/python-repl run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/python-repl", "run", "build" ]
publicDir = "artifacts/python-repl/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "24134"
BASE_PATH = "/"
